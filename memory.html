<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory — PIXELBOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0D0F1A;color:#F0F2FF;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;overflow:hidden;touch-action:manipulation;user-select:none;}
  #wrapper{width:min(96vw,440px);display:flex;flex-direction:column;align-items:center;gap:10px;}
  #hud{width:100%;display:flex;justify-content:space-between;padding:0 2px;}
  .hud-label{font-size:10px;letter-spacing:.15em;color:#A855F7;opacity:.7;text-transform:uppercase;}
  .hud-value{font-size:18px;font-weight:700;color:#F0F2FF;line-height:1;}
  #scoreboard{width:100%;display:none;gap:4px;}
  .score-row{flex:1;background:#12152A;border-radius:4px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;}
  #grid{display:grid;gap:6px;width:100%;}
  .card{border-radius:6px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .3s;-webkit-tap-highlight-color:transparent;}
  .card.flipped,.card.matched{transform:rotateY(180deg);}
  .card-front,.card-back{position:absolute;inset:0;border-radius:6px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
  .card-front{background:#12152A;border:1px solid rgba(168,85,247,.2);}
  .card-front::after{content:'?';color:rgba(168,85,247,.35);}
  .card-back{background:#1A1D2E;border:1px solid rgba(168,85,247,.4);transform:rotateY(180deg);}
  .card.matched .card-back{background:#1A2A1A;border-color:#39FF14;box-shadow:0 0 10px rgba(57,255,20,.3);}
  #turn-bar{width:100%;display:none;justify-content:center;gap:8px;}
  .turn-dot{width:10px;height:10px;border-radius:50%;opacity:.3;transition:all .2s;}
  .turn-dot.active{opacity:1;transform:scale(1.3);}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(13,15,26,.92);backdrop-filter:blur(4px);transition:opacity .3s;z-index:10;overflow-y:auto;padding:20px;}
  #overlay.hidden{opacity:0;pointer-events:none;}
  .ov-title{font-size:36px;font-weight:700;color:#A855F7;text-shadow:0 0 24px rgba(168,85,247,.6);}
  .ov-sub{font-size:12px;color:#F0F2FF;opacity:.5;}
  #msg{font-size:13px;color:#39FF14;display:none;text-align:center;}
  .section-label{font-size:10px;letter-spacing:.15em;color:#F0F2FF;opacity:.35;text-transform:uppercase;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .sel-btn{padding:9px 14px;background:transparent;border:2px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;border-radius:2px;font-family:'Space Mono',monospace;-webkit-tap-highlight-color:transparent;transition:all .15s;}
  .sel-btn.easy{border-color:#39FF14;color:#39FF14;} .sel-btn.normal{border-color:#A855F7;color:#A855F7;} .sel-btn.hard{border-color:#FF6B35;color:#FF6B35;}
  .sel-btn.selected.easy{background:#39FF14;color:#0D0F1A;} .sel-btn.selected.normal{background:#A855F7;color:#F0F2FF;} .sel-btn.selected.hard{background:#FF6B35;color:#0D0F1A;}
  .psel{border-color:#A855F7!important;color:#A855F7!important;}
  .psel.selected{background:#A855F7!important;color:#F0F2FF!important;}
  #start-btn{padding:14px 40px;background:transparent;border:2px solid #A855F7;color:#A855F7;font-family:'Space Mono',monospace;font-size:14px;cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:transparent;}
  #start-btn:active{background:#A855F7;color:#F0F2FF;}
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div><div class="hud-label">Züge</div><div class="hud-value" id="moves-el">0</div></div>
    <div style="text-align:center"><div class="hud-label">Paare</div><div class="hud-value" id="pairs-el">0/?</div></div>
    <div style="text-align:right"><div class="hud-label">Best</div><div class="hud-value" id="best-el">—</div></div>
  </div>
  <div id="turn-bar"></div>
  <div id="scoreboard"></div>
  <div id="grid"></div>
</div>
<div id="overlay">
  <div class="ov-title">MEMORY</div>
  <div class="ov-sub">Finde alle Paare</div>
  <div id="msg"></div>
  <div class="section-label">Schwierigkeit</div>
  <div class="btn-row" id="diff-row">
    <button class="sel-btn easy selected" data-diff="easy">EASY (4×3)</button>
    <button class="sel-btn normal" data-diff="normal">NORMAL (4×4)</button>
    <button class="sel-btn hard" data-diff="hard">HARD (6×4)</button>
  </div>
  <div class="section-label">Spieler</div>
  <div class="btn-row" id="player-row">
    <button class="sel-btn psel selected" data-p="1">1P</button>
    <button class="sel-btn psel" data-p="2">2P</button>
    <button class="sel-btn psel" data-p="3">3P</button>
    <button class="sel-btn psel" data-p="4">4P</button>
  </div>
  <button id="start-btn">START</button>
</div>
<script>
const gridEl=document.getElementById('grid');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('start-btn');
const movesEl=document.getElementById('moves-el');
const pairsEl=document.getElementById('pairs-el');
const bestEl=document.getElementById('best-el');
const msgEl=document.getElementById('msg');
const turnBar=document.getElementById('turn-bar');
const scoreboard=document.getElementById('scoreboard');

const DIFF={
  easy: {cols:4,rows:3},
  normal:{cols:4,rows:4},
  hard: {cols:6,rows:4},
};
const PLAYER_COLORS=['#00E5FF','#FFD166','#39FF14','#FF6B35'];
const ALL_EMOJIS=['🐠','🦋','🌊','⚡','🎯','🔥','💎','🍀','🎲','🎸','🌈','🚀'];
let selectedDiff='easy',numPlayers=1;

document.querySelectorAll('#diff-row .sel-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#diff-row .sel-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedDiff=btn.dataset.diff;});});
document.querySelectorAll('#player-row .sel-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#player-row .sel-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');numPlayers=parseInt(btn.dataset.p);});});

function getBest(){return parseInt(localStorage.getItem('pb_mem_'+selectedDiff)||'999');}
function setBest(v){localStorage.setItem('pb_mem_'+selectedDiff,v);}

let flipped,totalPairs,foundPairs,moves,locked,currentPlayer,playerScores,playerMoves;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function init(){
  const cfg=DIFF[selectedDiff];
  const pairs=(cfg.cols*cfg.rows)/2;
  const syms=shuffle([...ALL_EMOJIS].slice(0,pairs));
  const symbols=shuffle([...syms,...syms]);
  flipped=[];totalPairs=pairs;foundPairs=0;moves=0;locked=false;
  currentPlayer=0;playerScores=Array(numPlayers).fill(0);playerMoves=Array(numPlayers).fill(0);
  movesEl.textContent='0';pairsEl.textContent=`0/${pairs}`;
  const b=getBest();bestEl.textContent=b===999?'—':b;

  // Grid sizing
  gridEl.style.gridTemplateColumns=`repeat(${cfg.cols},1fr)`;
  const cardH=Math.min(Math.floor((window.innerHeight*.55)/cfg.rows),70);
  gridEl.innerHTML='';

  symbols.forEach((sym,i)=>{
    const card=document.createElement('div');
    card.className='card';card.dataset.sym=sym;card.dataset.idx=i;
    card.style.height=cardH+'px';
    const fs=Math.min(cardH*.55,32)+'px';
    card.innerHTML=`<div class="card-front" style="font-size:${Math.min(cardH*.4,22)}px"></div><div class="card-back" style="font-size:${fs}">${sym}</div>`;
    card.addEventListener('click',()=>flip(card));
    gridEl.appendChild(card);
  });

  // Turn bar
  if(numPlayers>1){
    turnBar.style.display='flex';
    turnBar.innerHTML=Array.from({length:numPlayers},(_,i)=>`<div class="turn-dot${i===0?' active':''}" style="background:${PLAYER_COLORS[i]}"></div>`).join('');
    scoreboard.style.display='flex';
    scoreboard.innerHTML=Array.from({length:numPlayers},(_,i)=>`<div class="score-row" style="border-left:3px solid ${PLAYER_COLORS[i]}"><span style="color:${PLAYER_COLORS[i]}">P${i+1}</span><span id="pscore-${i}">0 Paare</span></div>`).join('');
  } else {turnBar.style.display='none';scoreboard.style.display='none';}
}

function updateTurnDots(){
  document.querySelectorAll('.turn-dot').forEach((d,i)=>d.classList.toggle('active',i===currentPlayer));
}

function flip(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');flipped.push(card);
  if(flipped.length===2){
    moves++;movesEl.textContent=moves;
    playerMoves[currentPlayer]++;
    locked=true;
    if(flipped[0].dataset.sym===flipped[1].dataset.sym){
      flipped[0].classList.add('matched');flipped[1].classList.add('matched');
      foundPairs++;pairsEl.textContent=`${foundPairs}/${totalPairs}`;
      playerScores[currentPlayer]++;
      if(numPlayers>1){const el=document.getElementById('pscore-'+currentPlayer);if(el)el.textContent=playerScores[currentPlayer]+' Paare';}
      flipped=[];locked=false;
      if(foundPairs===totalPairs)setTimeout(win,300);
      // Same player gets another turn on match (multiplayer)
    } else {
      setTimeout(()=>{
        flipped.forEach(c=>c.classList.remove('flipped'));flipped=[];locked=false;
        if(numPlayers>1){currentPlayer=(currentPlayer+1)%numPlayers;updateTurnDots();}
      },900);
    }
  }
}

function win(){
  if(numPlayers===1){
    if(moves<getBest())setBest(moves);
    bestEl.textContent=getBest();
    msgEl.textContent=`🏆 Gewonnen in ${moves} Zügen!`;
  } else {
    const maxScore=Math.max(...playerScores);
    const winners=playerScores.reduce((a,s,i)=>s===maxScore?[...a,i]:a,[]);
    msgEl.textContent=winners.length>1?`🤝 Unentschieden! Je ${maxScore} Paare`:`🏆 Spieler ${winners[0]+1} gewinnt mit ${maxScore} Paaren!`;
  }
  msgEl.style.display='block';overlay.classList.remove('hidden');
}

function start(){overlay.classList.add('hidden');msgEl.style.display='none';startBtn.textContent='NEU';init();}
startBtn.addEventListener('click',start);
</script>
</body>
</html>
