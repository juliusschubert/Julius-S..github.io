<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 — PIXELBOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0D0F1A;color:#F0F2FF;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;overflow:hidden;touch-action:none;user-select:none;}
  #wrapper{width:min(96vw,440px);display:flex;flex-direction:column;align-items:center;gap:10px;}
  #hud{width:100%;display:flex;justify-content:space-between;padding:0 2px;}
  .hud-label{font-size:10px;letter-spacing:.15em;color:#FFD166;opacity:.6;text-transform:uppercase;}
  .hud-value{font-size:20px;font-weight:700;color:#F0F2FF;line-height:1;}
  #boards-row{display:flex;gap:8px;width:100%;justify-content:center;}
  .board{background:#1E2245;border:2px solid #2A2F66;border-radius:8px;padding:6px;display:grid;gap:5px;position:relative;flex:1;box-shadow:0 4px 18px rgba(0,0,0,.4);overflow:hidden;}
  .board.active-board{box-shadow:0 0 0 2px #FFD166;}
  .cell{border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .1s;}
  .player-label{font-size:10px;letter-spacing:.1em;color:#FFD166;text-align:center;margin-bottom:2px;opacity:.7;}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(13,15,26,.92);backdrop-filter:blur(4px);transition:opacity .3s;z-index:10;overflow-y:auto;padding:20px;}
  #overlay.hidden{opacity:0;pointer-events:none;}
  .ov-title{font-size:36px;font-weight:700;color:#FFD166;text-shadow:0 0 24px rgba(255,209,102,.6);}
  .ov-sub{font-size:12px;color:#F0F2FF;opacity:.5;}
  #msg{font-size:13px;color:#FF6B35;display:none;text-align:center;}
  .section-label{font-size:10px;letter-spacing:.15em;color:#F0F2FF;opacity:.35;text-transform:uppercase;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .sel-btn{padding:9px 16px;background:transparent;border:2px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;border-radius:2px;font-family:'Space Mono',monospace;-webkit-tap-highlight-color:transparent;transition:all .15s;}
  .sel-btn.easy{border-color:#39FF14;color:#39FF14;} .sel-btn.normal{border-color:#00E5FF;color:#00E5FF;} .sel-btn.hard{border-color:#FF6B35;color:#FF6B35;}
  .sel-btn.p1{border-color:#00E5FF;color:#00E5FF;} .sel-btn.p2{border-color:#FFD166;color:#FFD166;} .sel-btn.p3{border-color:#39FF14;color:#39FF14;} .sel-btn.p4{border-color:#FF6B35;color:#FF6B35;}
  .sel-btn.selected.easy,.sel-btn.selected.p1{background:#39FF14;color:#0D0F1A;border-color:#39FF14;}
  .sel-btn.selected.normal,.sel-btn.selected.p2{background:#00E5FF;color:#0D0F1A;border-color:#00E5FF;}
  .sel-btn.selected.hard,.sel-btn.selected.p3{background:#FFD166;color:#0D0F1A;border-color:#FFD166;}
  .sel-btn.selected.p4{background:#FF6B35;color:#0D0F1A;border-color:#FF6B35;}
  #start-btn{padding:14px 40px;background:transparent;border:2px solid #FFD166;color:#FFD166;font-family:'Space Mono',monospace;font-size:14px;cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:transparent;}
  #start-btn:active{background:#FFD166;color:#0D0F1A;}
  #turn-indicator{font-size:13px;letter-spacing:.1em;text-align:center;}
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div><div class="hud-label">Score</div><div class="hud-value" id="score-el">0</div></div>
    <div style="text-align:center"><div class="hud-label">Ziel</div><div class="hud-value" id="goal-el" style="color:#FFD166">2048</div></div>
    <div style="text-align:right"><div class="hud-label">Best</div><div class="hud-value" id="best-el">0</div></div>
  </div>
  <div id="turn-indicator"></div>
  <div id="boards-row"></div>
</div>
<div id="overlay">
  <div class="ov-title">2048</div>
  <div class="ov-sub">Wische · Pfeiltasten</div>
  <div id="msg"></div>
  <div class="section-label">Schwierigkeit</div>
  <div class="btn-row" id="diff-row">
    <button class="sel-btn easy selected" data-diff="easy">EASY (3x3)</button>
    <button class="sel-btn normal" data-diff="normal">NORMAL (4x4)</button>
    <button class="sel-btn hard" data-diff="hard">HARD (5x5)</button>
  </div>
  <div class="section-label">Spieler</div>
  <div class="btn-row" id="player-row">
    <button class="sel-btn p1 selected" data-p="1">1P</button>
    <button class="sel-btn p2" data-p="2">2P</button>
  </div>
  <button id="start-btn">START</button>
</div>
<script>
const boardsRow=document.getElementById('boards-row');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('start-btn');
const scoreEl=document.getElementById('score-el');
const bestEl=document.getElementById('best-el');
const goalEl=document.getElementById('goal-el');
const msgEl=document.getElementById('msg');
const turnEl=document.getElementById('turn-indicator');

const DIFF={easy:{size:3,goal:512},normal:{size:4,goal:2048},hard:{size:5,goal:4096}};
const PLAYER_COLORS=['#00E5FF','#FFD166','#39FF14','#FF6B35'];
let selectedDiff='easy',numPlayers=1;

document.querySelectorAll('#diff-row .sel-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('#diff-row .sel-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedDiff=btn.dataset.diff;goalEl.textContent=DIFF[selectedDiff].goal;});
});
document.querySelectorAll('#player-row .sel-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('#player-row .sel-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');numPlayers=parseInt(btn.dataset.p);});
});

const COLORS={0:'#12152A',2:'#1E2245',4:'#252952',8:'#CC4A1A',16:'#FF6B35',32:'#FF8C5A',64:'#FFA07A',128:'#FFD166',256:'#FFE08A',512:'#39FF14',1024:'#00E5FF',2048:'#ffffff',4096:'#A855F7'};
const TCOLORS={0:'transparent',2:'rgba(240,242,255,.4)',4:'rgba(240,242,255,.5)',8:'#F0F2FF',16:'#F0F2FF',32:'#F0F2FF',64:'#F0F2FF',128:'#0D0F1A',256:'#0D0F1A',512:'#0D0F1A',1024:'#0D0F1A',2048:'#0D0F1A',4096:'#F0F2FF'};

let grids,scores,currentPlayer,gameOver;

function newGrid(size){return Array.from({length:size},()=>Array(size).fill(0));}
function addTile(g){
  const size=g.length,empty=[];
  g.forEach((row,r)=>row.forEach((v,c)=>{if(!v)empty.push([r,c]);}));
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  g[r][c]=Math.random()<.9?2:4;
}
function slide(row){
  let a=row.filter(x=>x),pts=0;
  for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]){a[i]*=2;pts+=a[i];a.splice(i+1,1);i++;}}
  while(a.length<row.length)a.push(0);
  return{row:a,pts};
}

function init(){
  const cfg=DIFF[selectedDiff];
  grids=Array.from({length:numPlayers},()=>{const g=newGrid(cfg.size);addTile(g);addTile(g);return g;});
  scores=Array(numPlayers).fill(0);
  currentPlayer=0;gameOver=false;
  scoreEl.textContent='0';bestEl.textContent=getBest();
  goalEl.textContent=cfg.goal;
  renderBoards();updateTurnIndicator();
}

function getBest(){return parseInt(localStorage.getItem('pb_2048_'+selectedDiff+'_'+numPlayers)||'0');}
function setBest(v){localStorage.setItem('pb_2048_'+selectedDiff+'_'+numPlayers,v);}

function renderBoards(){
  boardsRow.innerHTML='';
  const cfg=DIFF[selectedDiff];
  const size=cfg.size;
  grids.forEach((grid,pi)=>{
    const wrap=document.createElement('div');
    if(numPlayers>1){const lbl=document.createElement('div');lbl.className='player-label';lbl.style.color=PLAYER_COLORS[pi];lbl.textContent=`P${pi+1}`;wrap.appendChild(lbl);}
    const board=document.createElement('div');
    board.className='board'+(numPlayers>1&&pi===currentPlayer?' active-board':'');
    board.style.gridTemplateColumns=`repeat(${size},1fr)`;
    board.style.gridTemplateRows=`repeat(${size},1fr)`;
    if(numPlayers>1)board.style.borderColor=PLAYER_COLORS[pi];
    grid.forEach(row=>row.forEach(v=>{
      const d=document.createElement('div');d.className='cell';
      const fs=v>=1024?'clamp(10px,2.5vw,15px)':v>=128?'clamp(12px,3vw,18px)':'clamp(14px,3.5vw,22px)';
      d.style.cssText=`background:${COLORS[v]||'#fff'};color:${TCOLORS[v]||'#0D0F1A'};font-size:${fs};${v>=512?'box-shadow:0 0 8px '+COLORS[v]+'88':''}`;
      d.textContent=v||'';board.appendChild(d);
    }));
    wrap.appendChild(board);boardsRow.appendChild(wrap);
  });
}

function updateTurnIndicator(){
  if(numPlayers===1){turnEl.textContent='';return;}
  turnEl.style.color=PLAYER_COLORS[currentPlayer];
  turnEl.textContent=`Spieler ${currentPlayer+1} ist dran`;
}

function move(dir){
  if(gameOver)return;
  const g=grids[currentPlayer];const size=g.length;
  let moved=false,pts=0;
  const apply=(g2)=>{grids[currentPlayer]=g2;};
  let ng=g.map(r=>[...r]);
  if(dir==='left'){for(let r=0;r<size;r++){const{row,pts:p}=slide(ng[r]);if(row.join()!==ng[r].join())moved=true;ng[r]=row;pts+=p;}}
  else if(dir==='right'){for(let r=0;r<size;r++){const rev=[...ng[r]].reverse();const{row,pts:p}=slide(rev);const n=row.reverse();if(n.join()!==ng[r].join())moved=true;ng[r]=n;pts+=p;}}
  else if(dir==='up'){for(let c=0;c<size;c++){const col=ng.map(r=>r[c]);const{row,pts:p}=slide(col);row.forEach((v,r)=>{if(v!==ng[r][c])moved=true;ng[r][c]=v;});pts+=p;}}
  else if(dir==='down'){for(let c=0;c<size;c++){const col=ng.map(r=>r[c]).reverse();const{row,pts:p}=slide(col);row.reverse().forEach((v,r)=>{if(v!==ng[r][c])moved=true;ng[r][c]=v;});pts+=p;}}
  if(!moved)return;
  apply(ng);scores[currentPlayer]+=pts;
  const total=scores.reduce((a,b)=>a+b,0);scoreEl.textContent=total;
  if(total>getBest())setBest(total);bestEl.textContent=getBest();
  addTile(grids[currentPlayer]);
  const goal=DIFF[selectedDiff].goal;
  if(grids[currentPlayer].some(r=>r.includes(goal))){setTimeout(()=>endGame(`🏆 P${currentPlayer+1} erreicht ${goal}!`),200);gameOver=true;}
  else if(isGameOver(grids[currentPlayer]))setTimeout(()=>nextPlayerOrEnd(),200);
  else{if(numPlayers>1){currentPlayer=(currentPlayer+1)%numPlayers;updateTurnIndicator();}}
  renderBoards();
}

function nextPlayerOrEnd(){
  if(numPlayers===1){endGame('Game Over');return;}
  // Check if all players are stuck
  const allDone=grids.every(g=>isGameOver(g));
  if(allDone){
    const maxScore=Math.max(...scores);const winner=scores.indexOf(maxScore);
    endGame(`🏆 Spieler ${winner+1} gewinnt mit ${maxScore} Punkten!`);
  }
}

function isGameOver(g){
  const size=g.length;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    if(!g[r][c])return false;
    if(c<size-1&&g[r][c]===g[r][c+1])return false;
    if(r<size-1&&g[r][c]===g[r+1][c])return false;
  }
  return true;
}
function endGame(m){gameOver=true;msgEl.textContent=m;msgEl.style.display='block';overlay.classList.remove('hidden');}
function start(){overlay.classList.add('hidden');msgEl.style.display='none';startBtn.textContent='NEU';init();}
startBtn.addEventListener('click',start);

document.addEventListener('keydown',e=>{
  if(!overlay.classList.contains('hidden'))return;
  if(e.key==='ArrowLeft'){e.preventDefault();move('left');}
  if(e.key==='ArrowRight'){e.preventDefault();move('right');}
  if(e.key==='ArrowUp'){e.preventDefault();move('up');}
  if(e.key==='ArrowDown'){e.preventDefault();move('down');}
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!overlay.classList.contains('hidden'))return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>20)move(dx>0?'right':'left');}
  else{if(Math.abs(dy)>20)move(dy>0?'down':'up');}
},{passive:true});
goalEl.textContent=DIFF[selectedDiff].goal;
</script>
</body>
</html>
