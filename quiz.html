<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<style>

  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0D0F1A;color:#F0F2FF;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;overflow:hidden;user-select:none;padding:8px;}
  #wrapper{width:min(96vw,440px);display:flex;flex-direction:column;align-items:center;gap:10px;}
  #scoreboard{width:100%;display:flex;gap:6px;}
  .p-card{flex:1;background:#12152A;border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;border:2px solid transparent;transition:border-color .2s;}
  .p-card.active{border-color:currentColor;}
  .p-name{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
  .p-score{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1;}
  #progress{width:100%;height:6px;background:#1E2245;border-radius:3px;overflow:hidden;}
  #progress-bar{height:100%;background:#A855F7;transition:width .1s linear;}
  #question-area{width:100%;background:#12152A;border-radius:8px;padding:16px;text-align:center;}
  #q-cat{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;color:#A855F7;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
  #q-text{font-size:15px;line-height:1.5;color:#F0F2FF;}
  #q-num{font-family:'Space Mono',monospace;font-size:10px;color:#C0C4E0;margin-top:6px;}
  #answers{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ans-btn{padding:14px 8px;background:#12152A;border:2px solid #1E2245;color:#C0C4E0;font-size:13px;cursor:pointer;border-radius:6px;-webkit-tap-highlight-color:transparent;transition:all .15s;text-align:center;line-height:1.3;}
  .ans-btn:active{transform:scale(.97);}
  .ans-btn.correct{background:#0D1F0D;border-color:#39FF14;color:#39FF14;}
  .ans-btn.wrong{background:#1F0D0D;border-color:#FF4444;color:#FF4444;}
  .ans-btn.reveal{background:#0D1A0D;border-color:#39FF14;color:#39FF14;}
  #turn-info{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;text-align:center;min-height:20px;font-weight:700;}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(13,15,26,.93);backdrop-filter:blur(4px);z-index:10;padding:20px;overflow-y:auto;}
  #overlay.hidden{opacity:0;pointer-events:none;}
  .ov-title{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;color:#A855F7;text-shadow:0 0 24px rgba(168,85,247,.6);}
  .ov-sub{font-size:12px;color:#C0C4E0;text-align:center;line-height:1.8;}
  #result-area{width:100%;max-width:380px;display:none;flex-direction:column;gap:6px;}
  .result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#12152A;border-radius:6px;font-size:14px;}
  .section-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;color:#C0C4E0;text-transform:uppercase;font-weight:700;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .sel-btn{padding:10px 16px;background:transparent;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;border-radius:3px;-webkit-tap-highlight-color:transparent;transition:all .15s;}
  .psel{border:2px solid #A855F7;color:#A855F7;}
  .psel.selected{background:#A855F7;color:#F0F2FF;}
  .rsel{border:2px solid #FFD166;color:#FFD166;}
  .rsel.selected{background:#FFD166;color:#0D0F1A;}
  #start-btn{padding:14px 44px;background:transparent;border:2px solid #A855F7;color:#A855F7;font-family:'Space Mono',monospace;font-size:15px;letter-spacing:.12em;cursor:pointer;border-radius:3px;font-weight:700;-webkit-tap-highlight-color:transparent;}
  #start-btn:active{background:#A855F7;color:#F0F2FF;}
</style>
</head>

const qCat = document.getElementById('q-cat');
const qText = document.getElementById('q-text');

const answersEl = document.getElementById('answers');
const resultArea = document.getElementById('result-area');

function shuffle(a) { for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function buildScoreboard() {
  scoreboardEl.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const d = document.createElement('div');
    d.className = 'p-card' + (i === currentPlayer ? ' active' : '');
    d.style.color = PLAYER_COLORS[i];
    d.innerHTML = `<div class="p-name">${PLAYER_NAMES[i]}</div><div class="p-score" id="pscore-${i}">0</div>`;
    scoreboardEl.appendChild(d);
  }
}

function updateScoreboard() {
  for (let i = 0; i < numPlayers; i++) {
    scoreboardEl.children[i].classList.toggle('active', i === currentPlayer);
    document.getElementById('pscore-' + i).textContent = scores[i];
  }
}

function init() {
  scores = Array(numPlayers).fill(0);
  currentPlayer = 0; round = 0; questionIdx = 0;
  questions = shuffle([...QUESTIONS]).slice(0, Math.min(totalRounds * numPlayers, QUESTIONS.length));
  buildScoreboard();
  nextQuestion();
}

function nextQuestion() {
  if (round >= totalRounds) { endGame(); return; }
  const q = questions[questionIdx % questions.length];
  answered = false; timeLeft = TIME_PER_Q;
  turnInfo.style.color = PLAYER_COLORS[currentPlayer];
  turnInfo.textContent = `${PLAYER_NAMES[currentPlayer]} ist dran`;
  qCat.textContent = q.cat;
  qText.textContent = q.q;
  qNum.textContent = `Frage ${round + 1} / ${totalRounds}`;
  answersEl.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn'; btn.textContent = ans;
    btn.addEventListener('click', () => answer(i, q.c, btn));
    answersEl.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  progressBar.style.transition = 'none'; progressBar.style.width = '100%';
  requestAnimationFrame(() => {
    progressBar.style.transition = `width ${TIME_PER_Q}s linear`;
    progressBar.style.width = '0%';
  });
  timerInterval = setInterval(() => { timeLeft--; if (timeLeft <= 0) { clearInterval(timerInterval); timeOut(); } }, 1000);
}

function answer(i, correct, btn) {
  if (answered) return; answered = true; clearInterval(timerInterval);
  answersEl.querySelectorAll('.ans-btn')[correct].classList.add('reveal');
  if (i === correct) {
    btn.classList.add('correct');
    const bonus = Math.max(0, Math.floor(timeLeft / 3));
    scores[currentPlayer] += 10 + bonus;
    document.getElementById('pscore-' + currentPlayer).textContent = scores[currentPlayer];
    turnInfo.textContent = `✅ +${10 + bonus} Punkte!`;
  } else {
    btn.classList.add('wrong');
    turnInfo.textContent = '❌ Falsch!';
  }
  setTimeout(advance, 1300);
}

function timeOut() {
  if (answered) return; answered = true;
  answersEl.querySelectorAll('.ans-btn')[questions[questionIdx % questions.length].c].classList.add('reveal');
  turnInfo.textContent = '⏰ Zeit abgelaufen!';
  setTimeout(advance, 1300);
}

function advance() {
  round++; questionIdx++;
  currentPlayer = (currentPlayer + 1) % numPlayers;
  updateScoreboard();
  if (round >= totalRounds) endGame(); else nextQuestion();
}

function endGame() {
  clearInterval(timerInterval);
  const sorted = [...scores.map((s,i) => ({i,s}))].sort((a,b) => b.s - a.s);
  resultArea.style.display = 'flex';
  resultArea.innerHTML = sorted.map((p, rank) => `
    <div class="result-row" style="border-left:3px solid ${PLAYER_COLORS[p.i]}">
      <span>${['🏆','🥈','🥉','  '][rank]} <span style="color:${PLAYER_COLORS[p.i]}">${PLAYER_NAMES[p.i]}</span></span>
      <span style="color:${PLAYER_COLORS[p.i]}">${p.s} Punkte</span>
    </div>`).join('');
  overlay.classList.remove('hidden');
  startBtn.textContent = 'NOCHMAL';
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  resultArea.style.display = 'none';
  init();
});
</script>
